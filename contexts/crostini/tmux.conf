# Crostini tmux config -- sources the shared Linux base and adds the
# panel status bar (a TUI substitute for waybar). Crostini always runs
# headless (no desktop panel), so the panel is sourced unconditionally.

source-file ~/dotfiles/contexts/desktop/tmux.conf
# Crostini always wants panel -- replace desktop's conditional session-created
# hook with an unconditional one. set-hook replaces at [0] (no accumulation).
set-hook -g session-created 'source-file ~/dotfiles/contexts/panel.tmux.conf'
