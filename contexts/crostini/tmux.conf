# Crostini tmux config — sources the shared Linux base and adds the
# panel status bar (a TUI substitute for waybar). On NixOS/Linux machines
# you have a real desktop panel, so this layer doesn't apply there.

source-file ~/dotfiles/contexts/linux/tmux.conf

# Mouse support is required for click handlers on status bar segments.
set -g mouse on

# Refresh status bar segments every 5 seconds.
set -g status-interval 5
set -g status-right-length 200

# Two-line status bar:
#   line 0: default tmux content (window list left, hostname right)
#   line 1: panel widgets (waybar substitute)
# Per tmux(1) MOUSE SUPPORT: range=user|X clicks fire the generic
# `Status` mouse key (NOT StatusLeft/Right), with #{mouse_status_range}
# carrying the range name and #{mouse_status_line} the row.
set -g status 2

# Line 0: keep default content but override status-right to just the
# hostname (no widgets — they live on line 1 to give them more room).
set -g status-right "#[fg=green]#H"

# Line 1: panel widgets, all right-aligned. Order mirrors waybar
# modules-right, minus widgets not applicable to Crostini (ssh, fw,
# hardware, tray, clock — see UC-10 for the full exclusion list).
# Health widgets render as plain colored text (no glyph). VPN-gated
# widgets (dm1, stash, gitlab, nexus) only appear when the tunnel is up.
# cpu/mem/disk only render when usage >= 90%.
set -g 'status-format[1]' "#[align=right]#[range=user|vpn]#(panel vpn)#[norange]  #[range=user|dm1]#(panel dm1)#[norange]  #[range=user|stash]#(panel stash)#[norange]  #[range=user|gitlab]#(panel gitlab)#[norange]  #[range=user|nexus]#(panel nexus)#[norange]  #[range=user|codeberg]#(panel codeberg)#[norange]  #[range=user|bitbucket]#(panel bitbucket)#[norange]  #[range=user|teams]#(panel teams)#[norange]  #[range=user|ntfy]#(panel ntfy)#[norange]  #[range=user|era]#(panel era)#[norange]  #[range=user|load]#(panel load)#[norange] #[range=user|cpu]#(panel cpu) #[norange]#[range=user|mem]#(panel mem) #[norange]#[range=user|disk]#(panel disk) #[norange]"

# Mouse click on a status-bar range invokes the panel's click handler.
# range=user|... only triggers the generic `Status` mouse key.
bind-key -n MouseDown1Status run-shell "panel click '#{mouse_status_range}'"
