# Panel status bar — TUI substitute for waybar on headless/SSH sessions.
# Always sourced via session-created hook, never during initial config
# parse (session-scoped set silently fails when no session exists).
# Options use set without -g so different sessions on the same tmux
# server can independently have panel (SSH) or not (local desktop).
#
# Mouse is enabled per-session (required for click handlers). Hold
# Shift for terminal-native selection when mouse is on.

# Mouse support is required for click handlers on status bar segments.
set mouse on

# Refresh status bar segments every 5 seconds.
set status-interval 5
set status-right-length 200

# Panel widgets: right-side content shared between 1-line and 2-line
# modes. Stored in a user option so the format string is defined once.
# #{E:...} evaluates the stored format when referenced from status-right
# or status-format[1].
#
# Canonical group order matches waybar (see docs/design.md UC-10):
#   [vpn] | [health: dm1..ntfy] | [services: era] | [hardware: load..disk] clock host
# Excluded: ssh, fw (system group), backlight, vol, temp (desktop-only
# hardware), tray.
#
# Silent layout check runs every refresh; produces no output but toggles
# between 1-line and 2-line mode based on terminal width vs content.
set @panel-right "\
#(panel layout 2>/dev/null)\
#[range=user|vpn]#(panel vpn)#[norange default]\
#(panel healthsep)\
#[range=user|dm1]#(panel dm1)#[norange default]\
#[range=user|stash]#(panel stash)#[norange default]\
#[range=user|gitlab]#(panel gitlab)#[norange default]\
#[range=user|nexus]#(panel nexus)#[norange default]\
#[range=user|remotemanager]#(panel remotemanager)#[norange default]\
#[range=user|codeberg]#(panel codeberg)#[norange default]\
#[range=user|bitbucket]#(panel bitbucket)#[norange default]\
#[range=user|teams]#(panel teams)#[norange default]\
#[range=user|ntfy]#(panel ntfy)#[norange default]\
 #[fg=colour240]|#[default]\
#[range=user|era]#(panel era)#[norange default]\
 #[fg=colour240]|#[default]\
#[range=user|load]#(panel load)#[norange default]\
#[range=user|cpu]#(panel cpu)#[norange default]\
#[range=user|mem]#(panel mem)#[norange default]\
#[range=user|disk]#(panel disk)#[norange default]\
#(panel bat)\
#[range=user|clock]#(panel clock)#[norange default]\
 #[fg=green]#(panel hostname)"

# 2-line mode: line 1 renders the panel content, right-aligned.
# 1-line mode: status-right renders it instead (set by `panel layout`).
# Per tmux(1) MOUSE SUPPORT: range=user|X clicks fire the generic
# `Status` mouse key (NOT StatusLeft/Right), with #{mouse_status_range}
# carrying the range name and #{mouse_status_line} the row.
# Setting status-format[1] at session scope implicitly creates an empty
# status-format[0] at session scope (tmux arrays are atomic per scope).
# Preserve the window-list line by copying the global default for [0].
run-shell 'tmux set "status-format[0]" "$(tmux show-options -gv "status-format[0]")"'
set 'status-format[1]' '#[align=right]#{E:#{@panel-right}}'

# Initial state: 2-line (layout check on first refresh will adjust).
set status 2
set status-right ''

# Layout hooks: recompute 1-line vs 2-line on resize and window changes.
set-hook client-resized      'run-shell "panel layout"'
set-hook window-linked       'run-shell "panel layout"'
set-hook window-unlinked     'run-shell "panel layout"'
set-hook after-rename-window 'run-shell "panel layout"'

# Mouse click on a status-bar range invokes the panel's click handler.
# range=user|... only triggers the generic `Status` mouse key.
# bind-key is inherently global — guard with show-option so clicks are
# silently ignored in non-panel sessions (where @panel-right is unset).
bind-key -n MouseDown1Status if-shell \
  'tmux show-option -qv @panel-right | grep -q .' \
  'run-shell "panel click \"#{mouse_status_range}\""'
